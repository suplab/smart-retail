AWSTemplateFormatVersion: "2010-09-09"
Description: >
  SmartRetail Network Stack — VPC, private/public subnets, NAT Gateway,
  VPC Endpoints for DynamoDB, S3, SSM, Secrets Manager, EventBridge, Kinesis.
  All ECS tasks and Lambda functions run in private subnets (CLAUDE.md §5.4).

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]
    Default: dev
  VpcCidr:
    Type: String
    Default: "10.0.0.0/16"
  PublicSubnet1Cidr:
    Type: String
    Default: "10.0.0.0/24"
  PublicSubnet2Cidr:
    Type: String
    Default: "10.0.1.0/24"
  PrivateSubnet1Cidr:
    Type: String
    Default: "10.0.2.0/24"
  PrivateSubnet2Cidr:
    Type: String
    Default: "10.0.3.0/24"

Resources:

  # ── VPC ─────────────────────────────────────────────────────────────────────
  SmartRetailVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub smartretail-vpc-${Environment}
        - Key: Project
          Value: SmartRetail
        - Key: Environment
          Value: !Ref Environment

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub smartretail-igw-${Environment}

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref SmartRetailVpc
      InternetGatewayId: !Ref InternetGateway

  # ── Subnets ──────────────────────────────────────────────────────────────────
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SmartRetailVpc
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub smartretail-public-1-${Environment}

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SmartRetailVpc
      CidrBlock: !Ref PublicSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub smartretail-public-2-${Environment}

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SmartRetailVpc
      CidrBlock: !Ref PrivateSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub smartretail-private-1-${Environment}

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SmartRetailVpc
      CidrBlock: !Ref PrivateSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub smartretail-private-2-${Environment}

  # ── NAT Gateway (cost: 1 shared NAT in dev; 1-per-AZ in prod) ───────────────
  NatEip:
    Type: AWS::EC2::EIP
    DependsOn: VpcGatewayAttachment
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub smartretail-nat-${Environment}

  # ── Route Tables ─────────────────────────────────────────────────────────────
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref SmartRetailVpc

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref SmartRetailVpc

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ── Security Groups ───────────────────────────────────────────────────────────
  EcsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SmartRetail ECS tasks — intra-VPC only
      VpcId: !Ref SmartRetailVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Ref VpcCidr
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: !Sub smartretail-ecs-sg-${Environment}

  VpcEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTPS from VPC for VPC Endpoints
      VpcId: !Ref SmartRetailVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref VpcCidr

  # ── VPC Endpoints — eliminate public egress for AWS service calls (§5.4) ─────
  DynamoDbEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref SmartRetailVpc
      ServiceName: !Sub com.amazonaws.${AWS::Region}.dynamodb
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable
        - !Ref PublicRouteTable

  S3Endpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref SmartRetailVpc
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable
        - !Ref PublicRouteTable

  SsmEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref SmartRetailVpc
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ssm
      VpcEndpointType: Interface
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref VpcEndpointSecurityGroup]
      PrivateDnsEnabled: true

  SecretsManagerEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref SmartRetailVpc
      ServiceName: !Sub com.amazonaws.${AWS::Region}.secretsmanager
      VpcEndpointType: Interface
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref VpcEndpointSecurityGroup]
      PrivateDnsEnabled: true

  EventBridgeEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref SmartRetailVpc
      ServiceName: !Sub com.amazonaws.${AWS::Region}.events
      VpcEndpointType: Interface
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref VpcEndpointSecurityGroup]
      PrivateDnsEnabled: true

  KinesisEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref SmartRetailVpc
      ServiceName: !Sub com.amazonaws.${AWS::Region}.kinesis-streams
      VpcEndpointType: Interface
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref VpcEndpointSecurityGroup]
      PrivateDnsEnabled: true

  # ── ECS Cluster ───────────────────────────────────────────────────────────────
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub smartretail-${Environment}
      ClusterSettings:
        - Name: containerInsights
          Value: enabled   # ADR-007 — Container Insights mandatory
      Tags:
        - Key: Project
          Value: SmartRetail
        - Key: Environment
          Value: !Ref Environment

  # ── ECR Repositories ─────────────────────────────────────────────────────────
  SisEcrRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub smartretail-sis-${Environment}
      ImageScanningConfiguration:
        ScanOnPush: true
      Tags:
        - Key: Project
          Value: SmartRetail

  ImsEcrRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub smartretail-ims-${Environment}
      ImageScanningConfiguration:
        ScanOnPush: true

  DfsEcrRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub smartretail-dfs-${Environment}
      ImageScanningConfiguration:
        ScanOnPush: true

  ReEcrRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub smartretail-re-${Environment}
      ImageScanningConfiguration:
        ScanOnPush: true

  SupEcrRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub smartretail-sup-${Environment}
      ImageScanningConfiguration:
        ScanOnPush: true

Outputs:
  VpcId:
    Value: !Ref SmartRetailVpc
    Export:
      Name: !Sub SmartRetail-${Environment}-VpcId
  PrivateSubnet1:
    Value: !Ref PrivateSubnet1
    Export:
      Name: !Sub SmartRetail-${Environment}-PrivateSubnet1
  PrivateSubnet2:
    Value: !Ref PrivateSubnet2
    Export:
      Name: !Sub SmartRetail-${Environment}-PrivateSubnet2
  PublicSubnet1:
    Value: !Ref PublicSubnet1
    Export:
      Name: !Sub SmartRetail-${Environment}-PublicSubnet1
  PublicSubnet2:
    Value: !Ref PublicSubnet2
    Export:
      Name: !Sub SmartRetail-${Environment}-PublicSubnet2
  EcsClusterArn:
    Value: !GetAtt EcsCluster.Arn
    Export:
      Name: !Sub SmartRetail-${Environment}-EcsClusterArn
  EcsClusterName:
    Value: !Ref EcsCluster
    Export:
      Name: !Sub SmartRetail-${Environment}-EcsClusterName
  EcsSecurityGroupId:
    Value: !Ref EcsSecurityGroup
    Export:
      Name: !Sub SmartRetail-${Environment}-EcsSecurityGroupId
  SisEcrRepoUri:
    Value: !GetAtt SisEcrRepo.RepositoryUri
    Export:
      Name: !Sub SmartRetail-${Environment}-SisEcrRepoUri
  ImsEcrRepoUri:
    Value: !GetAtt ImsEcrRepo.RepositoryUri
    Export:
      Name: !Sub SmartRetail-${Environment}-ImsEcrRepoUri
