server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets — reduces payload for Tier 2/3 suppliers on low-bandwidth (NFR)
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;
    gzip_min_length 1024;

    # Cache static assets aggressively — Vite content-hashes filenames
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API routes must not be cached here — served via CloudFront → API Gateway
    location /v1/ {
        return 404;
    }

    # React Router — all unknown paths fall back to index.html (SPA client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
