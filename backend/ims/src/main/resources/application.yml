spring:
  application:
    name: ims
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

ims:
  sqs:
    sales-events-queue-url: ${SQS_SALES_EVENTS_QUEUE_URL}
    forecast-queue-url: ${SQS_FORECAST_QUEUE_URL:}
    shipment-queue-url: ${SQS_SHIPMENT_QUEUE_URL}
    poll-interval-ms: ${IMS_SQS_POLL_INTERVAL_MS:100}
  dynamodb:
    inventory-table-name: ${DYNAMODB_INVENTORY_TABLE:inventory-positions}
  eventbridge:
    bus-name: ${EVENTBRIDGE_BUS_NAME:smartretail-events}

aws:
  region: ${AWS_REGION:us-east-1}
  endpoint-url: ${AWS_ENDPOINT_URL:#{null}}

resilience4j:
  circuitbreaker:
    instances:
      dynamoDb:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
      eventBridge:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
      sqsConsumer:
        failure-rate-threshold: 60
        wait-duration-in-open-state: 60s
        sliding-window-size: 5
  retry:
    instances:
      dynamoDb:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      eventBridge:
        max-attempts: 3
        wait-duration: 300ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2

logging:
  pattern:
    console: "%msg%n"
